services:
  hub-postgres:
    # image: postgres:16  # Docker Hub — niedostępne w sieci BGK
    image: repo.bank.com.pl/zrai-docker-remote-dev/postgres:16
    container_name: hub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hub_db
    ports:
      - "${HUB_PG_PORT:-55432}:5432"
    volumes:
      - hub_pg_data:/var/lib/postgresql/data

  keycloak-postgres:
    # image: postgres:16  # Docker Hub — niedostępne w sieci BGK
    image: repo.bank.com.pl/zrai-docker-remote-dev/postgres:16
    container_name: keycloak-postgres
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    command: ["start-dev", "--import-realm"]
    depends_on:
      - keycloak-postgres
    ports:
      - "${HUB_KEYCLOAK_PORT:-8081}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    volumes:
      - ./infra/keycloak/realm-hub.json:/opt/keycloak/data/import/realm-hub.json:ro

  backend:
    build:
      context: ./backend
      secrets:
        - pip_conf
    container_name: hub-backend
    depends_on:
      - hub-postgres
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@hub-postgres:5432/hub_db
      OIDC_ISSUER_URL: https://login.microsoftonline.com/29bb5b9c-200a-4906-89ef-c651c86ab301/v2.0
      OIDC_DISCOVERY_URL: https://login.microsoftonline.com/29bb5b9c-200a-4906-89ef-c651c86ab301/v2.0/.well-known/openid-configuration
      OIDC_AUDIENCE: "e517ed53-e3c5-42b4-b8c9-e35974e369ee"
      # BACKEND_CORS_ORIGINS: http://localhost:4200,https://ai-apps-portal-test.northeurope.cloudapp.azure.com  # stara domena Azure VM
      BACKEND_CORS_ORIGINS: http://localhost:4200,https://10.112.32.19/portal
    ports:
      - "${HUB_BACKEND_PORT:-18000}:8000"

volumes:
  hub_pg_data:
  keycloak_pg_data:

secrets:
  pip_conf:
    file: /etc/pip.conf
